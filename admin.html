<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Student Results
    </title>



    <style>

        body{

            font-family: Arial, sans-serif;

            background: #f1f5f9;

            padding: 30px;

        }


        h1{

            text-align: center;

            margin-bottom: 30px;

            color: #2563eb;

        }


        .table-container{

            overflow-x: auto;

        }


        table{

    width: 100%;

    border-collapse: collapse;

    background: white;

    margin-top: 20px;

}


       th{

    border: 1px solid #cbd5e1;

    padding: 4px 8px;

    background: #f8fafc;

    color: #1e293b;

    text-align: left;

    font-size: 13px;

}


     td{

    border: 1px solid #cbd5e1;

    padding: 3px 8px;

    font-size: 12px;

    color: #111827;

}


        tr:nth-child(even){

            background: #f8fafc;

        }


        tr:hover{

            background: #dbeafe;

        }


        @media(max-width: 768px){

            table{

                font-size: 13px;

            }

        }
        /* COLUMN WIDTH */

th:nth-child(1),
td:nth-child(1){

    width: 6%;

}


th:nth-child(2),
td:nth-child(2){

    width: 24%;

}


th:nth-child(3),
td:nth-child(3){

    width: 16%;

}


th:nth-child(4),
td:nth-child(4){

    width: 10%;

}


th:nth-child(5),
td:nth-child(5){

    width: 8%;

}


th:nth-child(6),
td:nth-child(6){

    width: 12%;

}


th:nth-child(7),
td:nth-child(7){

    width: 24%;

}

.top-bar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:20px;

}

#printBtn{

    background:#2563eb;

    color:white;

    border:none;

    padding:12px 20px;

    border-radius:8px;

    cursor:pointer;

    font-size:16px;

    font-weight:bold;

}

#printBtn:hover{

    background:#1d4ed8;

}

@media print{

    #printBtn{

        display:none;

    }

}
@media print{

    th{

        padding: 4px 8px;

        font-size: 12px;

    }

    td{

        padding: 3px 9px;

        font-size: 12px;

    }

    table{

        line-height: 1;

    }

}
    </style>

</head>

<body>


<div class="top-bar">

    <h1>
        Student Result Dashboard
    </h1>

    <button id="printBtn">
        🖨 Print
    </button>

</div>



    <div class="table-container">

        <table>

            <thead>

                <tr>
                    <th>
    S.No.
</th>

                    <th>
                        Student Name
                    </th>

                    <th>
                        Mobile Number
                    </th>

                    <th>
                        Exam
                    </th>

                    <th>
                        Score
                    </th>

                    <th>
                        Total Questions
                    </th>

                    <th>
                        Submitted Time
                    </th>

                </tr>

            </thead>



            <tbody id="resultTable">

            </tbody>

        </table>

    </div>




    <!-- FIREBASE -->

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>




    <script>


        const firebaseConfig = {
  apiKey: "AIzaSyAEzCQvZGaNZJiXb1KsbwaWOnzrEUzO_44",
  authDomain: "sarkari-rojgar-wala-e78dc.firebaseapp.com",
  projectId: "sarkari-rojgar-wala-e78dc",
  storageBucket: "sarkari-rojgar-wala-e78dc.firebasestorage.app",
  messagingSenderId: "631297693422",
  appId: "1:631297693422:web:0f1fb327bc4799904bc5ff",
  measurementId: "G-VGCKK23NL5"
};


        firebase.initializeApp(firebaseConfig);

        const database = firebase.database();




        database.ref("results")
        .on("value", function(snapshot){

            let data = snapshot.val();

            let table =
            document.getElementById("resultTable");


            table.innerHTML = "";


             let count = 1;
              
            for(let id in data){

                let student = data[id];


                table.innerHTML += `

                <tr>
                    <td>
                       ${count++}
                    </td>

                    <td>
                        ${student.studentName}
                    </td>

                    <td>
                        ${student.studentMobile}
                    </td>

                    <td>
                        ${student.exam}
                    </td>

                    <td>
                        ${student.finalScore}
                    </td>

                    <td>
                        ${student.totalQuestions}
                    </td>

                    <td>
                        ${student.submittedAt}
                    </td>

                </tr>

                `;
            }

        });


        const printBtn =
document.getElementById("printBtn");

printBtn.addEventListener(
"click",
function(){

    window.print();

});

    </script>

</body>

</html>
